name: Ultra-Fast Extractor with Parallel Processing

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Tautan langsung file kompresi'
        required: true
        type: string
        default: 'https://domain.com/contoh_file.tgz'
      search_patterns:
        description: |
          Pola file, pisahkan dengan koma.
          Contoh: *.img, bootloader.bin, *boot*, images/*.xml, system/build.prop
        required: true
        type: string
        default: '*.img'
      archive_format:
        description: 'Format file (contoh: tgz, zip, 7z, tar.gz)'
        required: true
        type: string
        default: 'tgz'
      unpack_tool:
        description: 'Paket aplikasi (Pilih sesuai format)'
        required: true
        type: choice
        options:
          - tar    # Gunakan untuk .tar, .tgz, .tar.gz (Didukung pigz)
          - unzip  # Gunakan untuk .zip murni
          - 7z     # Gunakan untuk .7z, .rar, atau multi-format

jobs:
  fast-extract-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 1. Pasang Alat Pendongkrak Kecepatan
        run: |
          echo "Menginstal aria2c (Parallel Downloader) dan pigz (Parallel GZIP)..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip p7zip-full aria2 pigz

      - name: 2. Unduh Paralel dengan Aria2c
        run: |
          ARCHIVE_NAME="downloaded_archive.${{ inputs.archive_format }}"
          echo "Mengunduh file besar secara paralel (16 koneksi)..."
          aria2c --max-connection-per-server=16 --split=16 --min-split-size=1M --continue=true --out="$ARCHIVE_NAME" "${{ inputs.file_url }}"
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: 3. Baca Struktur File (Kecepatan Tinggi)
        run: |
          echo "Membaca struktur file secara efisien..."
          case "${{ inputs.unpack_tool }}" in
            tar)
              if [[ "${{ inputs.archive_format }}" == "tgz" || "${{ inputs.archive_format }}" == "tar.gz" ]]; then
                tar -I pigz -tf "${{ env.ARCHIVE_NAME }}" > daftar_struktur.txt
              else
                tar -tf "${{ env.ARCHIVE_NAME }}" > daftar_struktur.txt
              fi
              ;;
            unzip)
              unzip -Z1 "${{ env.ARCHIVE_NAME }}" > daftar_struktur.txt
              ;;
            7z)
              7z l -ba -slt -mmt=on "${{ env.ARCHIVE_NAME }}" | grep "^Path = " | sed 's/^Path = //' > daftar_struktur.txt
              ;;
          esac

      - name: 4. Ekstrak Cepat Berdasarkan Beberapa Pola
        run: |
          mkdir -p hasil_ekstrak

          # ─── Parse input: pisahkan koma, buang spasi di awal/akhir tiap pola ───
          IFS=',' read -ra RAW_PATTERNS <<< "${{ inputs.search_patterns }}"
          PATTERNS=()
          for p in "${RAW_PATTERNS[@]}"; do
            trimmed="$(echo "$p" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            [[ -n "$trimmed" ]] && PATTERNS+=("$trimmed")
          done

          echo "Jumlah pola yang akan diekstrak: ${#PATTERNS[@]}"
          for p in "${PATTERNS[@]}"; do echo "  → $p"; done

          # ─── Ekstrak per pola ───────────────────────────────────────────────
          FAILED=0
          for PATTERN in "${PATTERNS[@]}"; do
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Mengekstrak pola: '$PATTERN'"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            case "${{ inputs.unpack_tool }}" in
              tar)
                if [[ "${{ inputs.archive_format }}" == "tgz" || "${{ inputs.archive_format }}" == "tar.gz" ]]; then
                  tar -I pigz -xf "${{ env.ARCHIVE_NAME }}" -C hasil_ekstrak/ \
                      --wildcards --no-anchored "$PATTERN" || \
                    { echo "⚠ Tidak ada file cocok untuk: $PATTERN"; FAILED=$((FAILED+1)); }
                else
                  tar -xf "${{ env.ARCHIVE_NAME }}" -C hasil_ekstrak/ \
                      --wildcards --no-anchored "$PATTERN" || \
                    { echo "⚠ Tidak ada file cocok untuk: $PATTERN"; FAILED=$((FAILED+1)); }
                fi
                ;;
              unzip)
                unzip -q "${{ env.ARCHIVE_NAME }}" "$PATTERN" -d hasil_ekstrak/ || \
                  { echo "⚠ Tidak ada file cocok untuk: $PATTERN"; FAILED=$((FAILED+1)); }
                ;;
              7z)
                7z x -mmt=on "${{ env.ARCHIVE_NAME }}" "$PATTERN" -ohasil_ekstrak/ -r || \
                  { echo "⚠ Tidak ada file cocok untuk: $PATTERN"; FAILED=$((FAILED+1)); }
                ;;
            esac
          done

          # ─── Ringkasan ───────────────────────────────────────────────────────
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          TOTAL=${#PATTERNS[@]}
          SUCCESS=$((TOTAL - FAILED))
          echo "Selesai: $SUCCESS/$TOTAL pola berhasil diekstrak."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Tampilkan hasil akhir
          echo ""
          echo "File yang berhasil diekstrak:"
          find hasil_ekstrak/ -type f | sort

      - name: 5. Upload Artefak Struktur File (.txt)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: struktur-${{ inputs.archive_format }}-txt
          path: daftar_struktur.txt
          retention-days: 7

      - name: 6. Upload Artefak Hasil (Zipped by GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: fast-ekstrak-hasil
          path: hasil_ekstrak/
          retention-days: 7

      - name: 7. Bersihkan File Besar
        if: always()
        run: rm -f "${{ env.ARCHIVE_NAME }}"
