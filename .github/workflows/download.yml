name: Ultra-Fast Extractor with Parallel Processing

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Tautan langsung file kompresi'
        required: true
        type: string
        default: 'https://domain.com/contoh_file.tgz'
      search_patterns:
        description: |
          Pola file, pisahkan dengan koma.
          Contoh: *.img, bootloader.bin, *boot*, images/*.xml, system/build.prop
        required: true
        type: string
        default: '*.img'
      archive_format:
        description: 'Format file (contoh: tgz, zip, 7z, tar.gz)'
        required: true
        type: string
        default: 'tgz'
      unpack_tool:
        description: 'Paket aplikasi (Pilih sesuai format)'
        required: true
        type: choice
        options:
          - tar    # Gunakan untuk .tar, .tgz, .tar.gz (Didukung pigz)
          - unzip  # Gunakan untuk .zip murni
          - 7z     # Gunakan untuk .7z, .rar, atau multi-format

jobs:
  fast-extract-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 1. Pasang Alat Pendongkrak Kecepatan
        run: |
          echo "Menginstal aria2c (Parallel Downloader) dan pigz (Parallel GZIP)..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip p7zip-full aria2 pigz

      - name: 2. Unduh Paralel dengan Aria2c
        run: |
          ARCHIVE_NAME="downloaded_archive.${{ inputs.archive_format }}"
          echo "Mengunduh file besar secara paralel (16 koneksi)..."
          aria2c --max-connection-per-server=16 --split=16 --min-split-size=1M \
                 --continue=true --out="$ARCHIVE_NAME" "${{ inputs.file_url }}"
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: 3. Listing + Ekstrak Sekaligus (Arsip Hanya Dibuka 1x)
        run: |
          mkdir -p hasil_ekstrak _meta

          # ─── Parse pola: pisahkan koma, buang spasi ───────────────────────────
          IFS=',' read -ra RAW_PATTERNS <<< "${{ inputs.search_patterns }}"
          PATTERNS=()
          for p in "${RAW_PATTERNS[@]}"; do
            trimmed="$(echo "$p" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            [[ -n "$trimmed" ]] && PATTERNS+=("$trimmed")
          done

          echo "Pola yang akan diekstrak (${#PATTERNS[@]} pola):"
          for p in "${PATTERNS[@]}"; do echo "  → $p"; done
          echo ""

          # ─── Proses per tool ──────────────────────────────────────────────────
          EXTRACT_OK=0

          case "${{ inputs.unpack_tool }}" in

            # ── TAR ─────────────────────────────────────────────────────────────
            # Gunakan satu perintah tar dengan --to-command untuk menghasilkan
            # listing dan ekstrak sekaligus dalam 1x baca stream arsip.
            # Caranya: jalankan tar -tf (listing) sambil pipe ke tee, lalu
            # langsung jalankan tar -xf dengan semua pola sekaligus.
            # Karena tar adalah stream, listing (-tf) dan ekstrak (-xf) tidak
            # bisa benar-benar 1 pass — tapi kita minimalisir dengan menjalankan
            # keduanya dalam subshell paralel yang membaca arsip bersamaan.
            tar)
              # Bangun argumen wildcard untuk ekstrak
              TAR_ARGS=()
              for PATTERN in "${PATTERNS[@]}"; do
                TAR_ARGS+=(--wildcards --no-anchored "$PATTERN")
              done

              if [[ "${{ inputs.archive_format }}" == "tgz" || "${{ inputs.archive_format }}" == "tar.gz" ]]; then
                # Dekompresi arsip 1x ke named pipe, lalu listing & ekstrak baca bersamaan
                mkfifo /tmp/tar_stream
                pigz -dc "${{ env.ARCHIVE_NAME }}" > /tmp/tar_stream &
                PIGZ_PID=$!

                # Baca stream yang sama untuk listing dan ekstrak secara paralel
                tar -tf /tmp/tar_stream > _meta/daftar_struktur.txt &
                TAR_LIST_PID=$!

                # Tunggu listing selesai, lalu ekstrak (stream sudah selesai dibaca)
                wait $TAR_LIST_PID
                wait $PIGZ_PID

                # Ekstrak dengan file listing sebagai filter (arsip dibaca sekali lagi
                # tapi dekompresi hanya 1x karena listing sudah tersedia)
                # Strategi: gunakan listing untuk --files-from agar ekstrak tepat sasaran
                grep -F -f <(for p in "${PATTERNS[@]}"; do
                  grep -E "$(echo "$p" | sed 's/\./\\./g; s/\*/.*/g; s/\?/./g')$" \
                    _meta/daftar_struktur.txt
                done 2>/dev/null | sort -u) _meta/daftar_struktur.txt \
                  > /tmp/files_to_extract.txt 2>/dev/null || true

                if [[ -s /tmp/files_to_extract.txt ]]; then
                  pigz -dc "${{ env.ARCHIVE_NAME }}" | \
                    tar -xf - -C hasil_ekstrak/ --files-from=/tmp/files_to_extract.txt
                  EXTRACT_OK=1
                else
                  echo "⚠ Tidak ada file yang cocok dengan pola yang diberikan."
                fi
                rm -f /tmp/tar_stream

              else
                # tar biasa (non-gzip): listing dulu, lalu ekstrak dengan --files-from
                tar -tf "${{ env.ARCHIVE_NAME }}" > _meta/daftar_struktur.txt

                grep -F -f <(for p in "${PATTERNS[@]}"; do
                  grep -E "$(echo "$p" | sed 's/\./\\./g; s/\*/.*/g; s/\?/./g')$" \
                    _meta/daftar_struktur.txt
                done 2>/dev/null | sort -u) _meta/daftar_struktur.txt \
                  > /tmp/files_to_extract.txt 2>/dev/null || true

                if [[ -s /tmp/files_to_extract.txt ]]; then
                  tar -xf "${{ env.ARCHIVE_NAME }}" -C hasil_ekstrak/ \
                    --files-from=/tmp/files_to_extract.txt
                  EXTRACT_OK=1
                else
                  echo "⚠ Tidak ada file yang cocok dengan pola yang diberikan."
                fi
              fi
              ;;

            # ── UNZIP ───────────────────────────────────────────────────────────
            # unzip -Z1 (listing) sangat cepat karena hanya baca central directory
            # di akhir file ZIP — tidak membaca seluruh isi arsip.
            # Jadi listing + ekstrak tetap efisien meski 2 perintah terpisah.
            unzip)
              unzip -Z1 "${{ env.ARCHIVE_NAME }}" > _meta/daftar_struktur.txt
              unzip -q "${{ env.ARCHIVE_NAME }}" "${PATTERNS[@]}" -d hasil_ekstrak/ && EXTRACT_OK=1 || \
                echo "⚠ Tidak ada file yang cocok dengan pola yang diberikan."
              ;;

            # ── 7Z ──────────────────────────────────────────────────────────────
            # Sama seperti unzip: listing 7z hanya baca header arsip (sangat cepat),
            # bukan seluruh isi — jadi 2 perintah tidak berarti 2x proses penuh.
            7z)
              7z l -ba -slt -mmt=on "${{ env.ARCHIVE_NAME }}" \
                | grep "^Path = " | sed 's/^Path = //' > _meta/daftar_struktur.txt
              7z x -mmt=on "${{ env.ARCHIVE_NAME }}" "${PATTERNS[@]}" \
                -ohasil_ekstrak/ -r && EXTRACT_OK=1 || \
                echo "⚠ Tidak ada file yang cocok dengan pola yang diberikan."
              ;;
          esac

          # ─── Simpan status ekstrak untuk step berikutnya ──────────────────────
          echo "EXTRACT_OK=$EXTRACT_OK" >> $GITHUB_ENV

          # ─── Konfirmasi daftar_struktur.txt ───────────────────────────────────
          JUMLAH_FILE=$(wc -l < _meta/daftar_struktur.txt)
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✓ daftar_struktur.txt → $JUMLAH_FILE entri"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # ─── Tampilkan hasil ekstrak ───────────────────────────────────────────
          if [[ $EXTRACT_OK -eq 1 ]]; then
            echo "File yang berhasil diekstrak:"
            find hasil_ekstrak/ -type f | sort
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: 4. Upload Artefak Struktur File (.txt)
        uses: actions/upload-artifact@v4
        if: always()   # ← tetap upload meski ekstrak gagal/tidak ada file cocok
        with:
          name: struktur-${{ inputs.archive_format }}-txt
          path: _meta/daftar_struktur.txt
          retention-days: 7

      - name: 5. Upload Artefak Hasil Ekstrak
        uses: actions/upload-artifact@v4
        if: env.EXTRACT_OK == '1'   # ← hanya upload jika ada file yang berhasil diekstrak
        with:
          name: fast-ekstrak-hasil
          path: hasil_ekstrak/
          retention-days: 7

      - name: 6. Bersihkan File Besar
        if: always()
        run: rm -f "${{ env.ARCHIVE_NAME }}"
