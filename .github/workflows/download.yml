name: Ultra-Fast Extractor with Parallel Processing

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Tautan langsung file kompresi'
        required: true
        type: string
        default: 'https://domain.com/contoh_file.tgz'
      search_patterns:
        description: |
          Pola file, pisahkan dengan koma.
          Contoh: *.img, bootloader.bin, *boot*, images/*.xml, system/build.prop
        required: true
        type: string
        default: '*.img'
      archive_format:
        description: 'Format file (contoh: tgz, zip, 7z, tar.gz)'
        required: true
        type: string
        default: 'tgz'
      unpack_tool:
        description: 'Paket aplikasi (Pilih sesuai format)'
        required: true
        type: choice
        options:
          - tar    # Gunakan untuk .tar, .tgz, .tar.gz (Didukung pigz)
          - unzip  # Gunakan untuk .zip murni
          - 7z     # Gunakan untuk .7z, .rar, atau multi-format
      retention_days:
        description: 'Lama simpan artefak (hari)'
        required: true
        type: choice
        options:
          - '3'
          - '7'
          - '14'
          - '30'
        default: '7'
      checksum_url:
        description: '[Opsional] URL file checksum MD5/SHA256 untuk validasi arsip'
        required: false
        type: string
        default: ''

env:
  ARCHIVE_NAME: downloaded_archive.${{ inputs.archive_format }}

jobs:
  fast-extract-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Cache tool ke folder user (~/.apt-cache) agar tidak butuh sudo saat tar ──
      - name: 0. Cache Paket APT
        id: apt-cache
        uses: actions/cache@v4
        with:
          path: ~/.apt-cache
          key: apt-${{ runner.os }}-extractor-v2-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: apt-${{ runner.os }}-extractor-v2-

      - name: 1. Pasang Alat Pendongkrak Kecepatan
        run: |
          # Jika cache hit: salin .deb dari ~/.apt-cache ke /var/cache/apt/archives lalu install
          # Jika cache miss: download, install, lalu salin .deb ke ~/.apt-cache untuk disimpan
          TOOLS="unzip p7zip-full aria2 pigz pv"
          mkdir -p ~/.apt-cache

          if [[ "${{ steps.apt-cache.outputs.cache-hit }}" == "true" ]]; then
            echo "Cache hit — menyalin paket dari cache..."
            sudo cp -n ~/.apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
            sudo apt-get install -y -qq --no-download $TOOLS 2>/dev/null ||               { echo "Fallback: download ulang paket yang hilang..."; sudo apt-get install -y -qq $TOOLS; }
          else
            echo "Cache miss — mengunduh dan menginstal paket..."
            sudo apt-get update -qq
            sudo apt-get install -y -qq $TOOLS
            # Salin .deb yang baru diunduh ke folder user untuk di-cache
            cp /var/cache/apt/archives/*.deb ~/.apt-cache/ 2>/dev/null || true
            echo "$(ls ~/.apt-cache/*.deb 2>/dev/null | wc -l) paket disimpan ke cache."
          fi

      - name: 2. Unduh Paralel dengan Aria2c
        run: |
          echo "Mengunduh file besar secara paralel (16 koneksi)..."
          aria2c \
            --max-connection-per-server=16 \
            --split=16 \
            --min-split-size=1M \
            --continue=true \
            --retry-wait=5 \
            --max-tries=5 \
            --out="$ARCHIVE_NAME" \
            "${{ inputs.file_url }}"

          # ── [BARU] Tampilkan ukuran file yang diunduh ──
          echo ""
          echo "Ukuran file: $(du -sh "$ARCHIVE_NAME" | cut -f1)"

      # ── [BARU] Validasi checksum jika URL checksum disediakan ────────────────
      - name: 2b. Validasi Checksum (Opsional)
        if: inputs.checksum_url != ''
        run: |
          echo "Mengunduh file checksum..."
          curl -sL "${{ inputs.checksum_url }}" -o _checksum.txt
          cat _checksum.txt

          # Deteksi otomatis MD5 atau SHA256 dari panjang hash
          HASH=$(awk '{print $1}' _checksum.txt | head -1)
          HASH_LEN=${#HASH}

          if [[ $HASH_LEN -eq 32 ]]; then
            echo "Menggunakan MD5..."
            echo "$HASH  $ARCHIVE_NAME" | md5sum -c -
          elif [[ $HASH_LEN -eq 64 ]]; then
            echo "Menggunakan SHA256..."
            echo "$HASH  $ARCHIVE_NAME" | sha256sum -c -
          else
            echo "⚠ Format checksum tidak dikenali, lewati validasi."
          fi

      - name: 3. Listing + Ekstrak Sekaligus (Arsip Hanya Dibuka 1x)
        run: |
          mkdir -p hasil_ekstrak _meta

          # ─── Parse pola: pisahkan koma, buang spasi ───────────────────────────
          IFS=',' read -ra RAW_PATTERNS <<< "${{ inputs.search_patterns }}"
          PATTERNS=()
          for p in "${RAW_PATTERNS[@]}"; do
            trimmed="$(echo "$p" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            [[ -n "$trimmed" ]] && PATTERNS+=("$trimmed")
          done

          echo "Pola yang akan diekstrak (${#PATTERNS[@]} pola):"
          for p in "${PATTERNS[@]}"; do echo "  → $p"; done
          echo ""

          EXTRACT_OK=0
          # ── [BARU] Catat waktu mulai untuk laporan durasi ──
          TIME_START=$SECONDS

          case "${{ inputs.unpack_tool }}" in

            tar)
              TAR_ARGS=()
              for PATTERN in "${PATTERNS[@]}"; do
                TAR_ARGS+=(--wildcards --no-anchored "$PATTERN")
              done

              if [[ "${{ inputs.archive_format }}" == "tgz" || "${{ inputs.archive_format }}" == "tar.gz" ]]; then
                mkfifo /tmp/tar_stream
                pigz -dc "$ARCHIVE_NAME" > /tmp/tar_stream &
                PIGZ_PID=$!

                tar -tf /tmp/tar_stream > _meta/daftar_struktur.txt &
                TAR_LIST_PID=$!

                wait $TAR_LIST_PID
                wait $PIGZ_PID

                for p in "${PATTERNS[@]}"; do
                  grep -E "$(echo "$p" | sed 's/\./\\./g; s/\*/.*/g; s/\?/./g')$" \
                    _meta/daftar_struktur.txt
                done 2>/dev/null | sort -u > /tmp/files_to_extract.txt || true

                if [[ -s /tmp/files_to_extract.txt ]]; then
                  # ── [BARU] pv menampilkan progress bar dekompresi ──
                  FILE_SIZE=$(stat -c%s "$ARCHIVE_NAME")
                  pv -s "$FILE_SIZE" "$ARCHIVE_NAME" | pigz -dc | \
                    tar -xf - -C hasil_ekstrak/ --files-from=/tmp/files_to_extract.txt
                  EXTRACT_OK=1
                else
                  echo "⚠ Tidak ada file yang cocok dengan pola yang diberikan."
                fi
                rm -f /tmp/tar_stream

              else
                tar -tf "$ARCHIVE_NAME" > _meta/daftar_struktur.txt

                for p in "${PATTERNS[@]}"; do
                  grep -E "$(echo "$p" | sed 's/\./\\./g; s/\*/.*/g; s/\?/./g')$" \
                    _meta/daftar_struktur.txt
                done 2>/dev/null | sort -u > /tmp/files_to_extract.txt || true

                if [[ -s /tmp/files_to_extract.txt ]]; then
                  tar -xf "$ARCHIVE_NAME" -C hasil_ekstrak/ \
                    --files-from=/tmp/files_to_extract.txt
                  EXTRACT_OK=1
                else
                  echo "⚠ Tidak ada file yang cocok dengan pola yang diberikan."
                fi
              fi
              ;;

            unzip)
              unzip -Z1 "$ARCHIVE_NAME" > _meta/daftar_struktur.txt
              unzip -q "$ARCHIVE_NAME" "${PATTERNS[@]}" -d hasil_ekstrak/ && EXTRACT_OK=1 || \
                echo "⚠ Tidak ada file yang cocok dengan pola yang diberikan."
              ;;

            7z)
              7z l -ba -slt -mmt=on "$ARCHIVE_NAME" \
                | grep "^Path = " | sed 's/^Path = //' > _meta/daftar_struktur.txt
              7z x -mmt=on "$ARCHIVE_NAME" "${PATTERNS[@]}" \
                -ohasil_ekstrak/ -r && EXTRACT_OK=1 || \
                echo "⚠ Tidak ada file yang cocok dengan pola yang diberikan."
              ;;
          esac

          echo "EXTRACT_OK=$EXTRACT_OK" >> $GITHUB_ENV

          # ── [BARU] Laporan ringkas: durasi, ukuran hasil, jumlah file ──────────
          TIME_END=$SECONDS
          DURATION=$((TIME_END - TIME_START))
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✓ daftar_struktur.txt → $(wc -l < _meta/daftar_struktur.txt) entri"
          if [[ $EXTRACT_OK -eq 1 ]]; then
            JUMLAH=$(find hasil_ekstrak/ -type f | wc -l)
            UKURAN=$(du -sh hasil_ekstrak/ | cut -f1)
            echo "✓ File diekstrak  → $JUMLAH file ($UKURAN)"
            echo ""
            echo "Daftar file hasil ekstrak:"
            find hasil_ekstrak/ -type f | sort
          fi
          echo "⏱ Durasi step ini → ${DURATION}s"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: 4. Upload Artefak Struktur File (.txt)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: struktur-${{ inputs.archive_format }}-txt
          path: _meta/daftar_struktur.txt
          retention-days: ${{ inputs.retention_days }}

      - name: 5. Upload Artefak Hasil Ekstrak
        uses: actions/upload-artifact@v4
        if: env.EXTRACT_OK == '1'
        with:
          name: fast-ekstrak-hasil
          path: hasil_ekstrak/
          retention-days: ${{ inputs.retention_days }}

      # ── [BARU] Ringkasan akhir tampil di tab Summary GitHub Actions ───────────
      - name: 6. Tulis Ringkasan ke Job Summary
        if: always()
        run: |
          {
            echo "## 📦 Hasil Ekstrak"
            echo ""
            echo "| Parameter | Nilai |"
            echo "|-----------|-------|"
            echo "| File URL | \`${{ inputs.file_url }}\` |"
            echo "| Format | \`${{ inputs.archive_format }}\` |"
            echo "| Tool | \`${{ inputs.unpack_tool }}\` |"
            echo "| Pola | \`${{ inputs.search_patterns }}\` |"
            echo "| Ukuran arsip | $(du -sh "$ARCHIVE_NAME" 2>/dev/null | cut -f1 || echo 'sudah dihapus') |"
            echo "| Retensi artefak | ${{ inputs.retention_days }} hari |"
            echo ""
            if [[ "$EXTRACT_OK" == "1" ]]; then
              JUMLAH=$(find hasil_ekstrak/ -type f 2>/dev/null | wc -l)
              UKURAN=$(du -sh hasil_ekstrak/ 2>/dev/null | cut -f1 || echo '-')
              echo "### ✅ Ekstrak Berhasil"
              echo "- **$JUMLAH file** diekstrak (total **$UKURAN**)"
              echo ""
              echo "#### File yang diekstrak:"
              echo '```'
              find hasil_ekstrak/ -type f | sort
              echo '```'
            else
              echo "### ⚠️ Tidak Ada File Cocok"
              echo "Tidak ada file dalam arsip yang cocok dengan pola: \`${{ inputs.search_patterns }}\`"
              echo ""
              echo "> Gunakan artefak **daftar_struktur.txt** untuk melihat isi arsip dan sesuaikan pola."
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: 7. Bersihkan Semua File Kerja
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧹 Memulai pembersihan workspace..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Catat ruang disk sebelum dihapus
          SPACE_BEFORE=$(df -h . | awk 'NR==2{print $4}')

          # ── Arsip yang diunduh ──────────────────────────────────────────────
          if [[ -f "$ARCHIVE_NAME" ]]; then
            SIZE=$(du -sh "$ARCHIVE_NAME" | cut -f1)
            rm -f "$ARCHIVE_NAME"
            echo "✓ Arsip unduhan dihapus         ($SIZE) → $ARCHIVE_NAME"
          else
            echo "– Arsip unduhan tidak ada (sudah terhapus sebelumnya)"
          fi

          # ── Hasil ekstrak ───────────────────────────────────────────────────
          if [[ -d hasil_ekstrak ]]; then
            SIZE=$(du -sh hasil_ekstrak/ | cut -f1)
            JUMLAH=$(find hasil_ekstrak/ -type f | wc -l)
            rm -rf hasil_ekstrak/
            echo "✓ Hasil ekstrak dihapus         ($SIZE, $JUMLAH file) → hasil_ekstrak/"
          else
            echo "– hasil_ekstrak/ tidak ada"
          fi

          # ── Folder _meta (daftar_struktur.txt, dll) ─────────────────────────
          if [[ -d _meta ]]; then
            SIZE=$(du -sh _meta/ | cut -f1)
            rm -rf _meta/
            echo "✓ Folder _meta dihapus          ($SIZE) → _meta/"
          else
            echo "– _meta/ tidak ada"
          fi

          # ── File temporer di /tmp ────────────────────────────────────────────
          for f in /tmp/tar_stream /tmp/files_to_extract.txt /tmp/_checksum.txt; do
            if [[ -e "$f" ]]; then
              rm -f "$f"
              echo "✓ File temp dihapus             → $f"
            fi
          done

          # ── Laporan ruang disk yang dibebaskan ───────────────────────────────
          SPACE_AFTER=$(df -h . | awk 'NR==2{print $4}')
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Ruang disk tersedia:"
          echo "   Sebelum cleanup : $SPACE_BEFORE"
          echo "   Setelah cleanup : $SPACE_AFTER"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Workspace bersih."
